name: ✨ 功能建议
description: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请描述清楚你的需求和场景。

  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 你当前遇到了什么不便？请描述具体的使用场景。
      placeholder: "例如: 当世界书条目超过 100 条时，很难快速找到需要编辑的那一条..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望插件如何解决？描述你设想的功能或交互方式。
      placeholder: "例如: 在世界书列表增加搜索框，支持按名称/关键词过滤..."
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: 涉及模块
      description: 这个建议主要改进哪个模块？
      multiple: true
      options:
        - 世界书 (WorldBook)
        - 写作素材库 (KB)
        - 角色卡 (Persona)
        - 文档知识库 (RAG)
        - 动态记忆 (Memory)
        - 状态栏 (Status Bar)
        - Web 管理面板
        - 配置 (Config)
        - 命令系统
        - 其他
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他实现方式？为什么倾向当前方案？
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - 低 - 锦上添花
        - 中 - 改善体验
        - 高 - 影响核心使用
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      options:
        - label: 我已搜索现有 Issues，确认这不是重复建议
          required: true
        - label: 我已查阅 README，确认该功能确实尚未实现
          required: true
