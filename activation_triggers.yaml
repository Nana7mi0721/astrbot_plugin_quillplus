# Intimate Mode — 编码模式激活词
# 只管"要不要进入编码模式"，不管"注入什么内容"。
# 内容匹配由写作素材库关键词负责。
#
# 维护说明:
# - activation_words: 子串匹配（适合中文）
# - exact_match_words: 整词边界匹配（适合英文，用 \b 包裹）
# - 保持精简，~50-60 个词足够覆盖
# - 太泛的词（如"要"、"给"、"热"）不要放这里，放写作素材库的 secondary_keywords

activation_words:
  # === 延续/加码信号 ===
  - 继续
  - 再来
  - 不够
  - 加深
  - 用力
  - 温柔点
  - 再刺激一点

  # === 进入场景 ===
  - 开写
  - 开始
  - 进入剧情
  - 进入角色
  - 写一段
  - 来一段
  - 正式进入

  # === 感官/状态触发 ===
  - 湿润
  - 颤抖
  - 呻吟
  - 失控
  - 瘫软
  - 紧绷
  - 收缩

  # === 具体动作（精选高频词） ===
  - 插入
  - 抽插
  - 舔
  - 吸
  - 夹紧
  - 吞吐
  - 摩擦
  - 撞击
  - 痉挛
  - 潮吹

exact_match_words: []
